<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RedaON — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="supabase-auth.js"></script>
<style>
  *{word-break:normal!important;overflow-wrap:break-word}
  body{background:#0b0e14;font-family:'Segoe UI',sans-serif}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0b0e14}::-webkit-scrollbar-thumb{background:#45edee44;border-radius:2px}
  scrollbar-width:thin;scrollbar-color:#45edee44 #0b0e14;

  .input-field{
    background:#13161f;
    border:1.5px solid #1e2330;
    color:#fff;
    border-radius:10px;
    padding:14px 16px;
    width:100%;
    font-size:15px;
    transition:border-color .2s;
    outline:none;
  }
  .input-field:focus{border-color:#45edee}
  .input-field::placeholder{color:#4a5568}

  .btn-primary{
    background:linear-gradient(135deg,#45edee,#6c5ce7);
    color:#0b0e14;
    font-weight:700;
    border-radius:10px;
    padding:14px;
    width:100%;
    font-size:16px;
    border:none;
    cursor:pointer;
    transition:opacity .2s,transform .1s;
  }
  .btn-primary:hover{opacity:.9}
  .btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}

  .card{
    background:#13161f;
    border:1px solid #1e2330;
    border-radius:16px;
  }

  .logo-text{font-style:italic;font-weight:800;font-size:2rem;letter-spacing:-1px}
  .logo-on{color:#45edee}

  .tab-btn{
    flex:1;padding:10px;border-radius:8px;font-weight:600;font-size:14px;
    transition:all .2s;cursor:pointer;border:none;
  }
  .tab-btn.active{background:linear-gradient(135deg,#45edee22,#6c5ce722);color:#45edee;border:1px solid #45edee44}
  .tab-btn.inactive{background:transparent;color:#6b7280;border:1px solid transparent}

  .error-msg{background:#e74c3c22;border:1px solid #e74c3c44;color:#f87171;border-radius:8px;padding:12px 14px;font-size:14px;display:none}
  .success-msg{background:#45edee22;border:1px solid #45edee44;color:#45edee;border-radius:8px;padding:12px 14px;font-size:14px;display:none}

  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:20px;height:20px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .35s ease-out}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Background decorativo -->
<div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0">
  <div style="position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,#45edee08 0%,transparent 70%);border-radius:50%"></div>
  <div style="position:absolute;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,#6c5ce708 0%,transparent 70%);border-radius:50%"></div>
</div>

<div class="w-full max-w-sm fade-in" style="position:relative;z-index:1">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="logo-text text-white">Reda<span class="logo-on">ON</span></div>
    <p style="color:#6b7280;font-size:14px;margin-top:4px">Plataforma de redação para o ENEM</p>
  </div>

  <!-- Card principal -->
  <div class="card p-6">

    <!-- Tabs Aluno / Professor -->
    <div class="flex gap-2 mb-6 p-1" style="background:#0b0e14;border-radius:10px">
      <button class="tab-btn active" id="tab-aluno" onclick="setTab('aluno')">👨‍🎓 Aluno</button>
      <button class="tab-btn inactive" id="tab-professor" onclick="setTab('professor')">👩‍🏫 Professor</button>
    </div>

    <!-- Sub-tabs: Entrar / Cadastrar -->
    <div class="flex gap-4 mb-6" style="border-bottom:1px solid #1e2330">
      <div id="sub-login" onclick="setSubTab('login')"
        style="padding-bottom:10px;font-size:15px;font-weight:600;color:#45edee;border-bottom:2px solid #45edee;margin-bottom:-1px;cursor:pointer;transition:all .2s">
        Entrar
      </div>
      <div id="sub-cadastro" onclick="setSubTab('cadastro')"
        style="padding-bottom:10px;font-size:15px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .2s">
        Criar conta
      </div>
    </div>

    <!-- FORM: LOGIN -->
    <div id="form-login">
      <div class="mb-4">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">E-mail</label>
        <input id="login-email" type="email" class="input-field" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="mb-2">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">Senha</label>
        <div style="position:relative">
          <input id="login-senha" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password" style="padding-right:48px">
          <button onclick="toggleSenha('login-senha',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px">👁</button>
        </div>
      </div>
      <div class="text-right mb-5">
        <a href="recuperar-senha.html" style="color:#45edee;font-size:13px;text-decoration:none">Esqueci minha senha</a>
      </div>

      <div class="error-msg mb-4" id="login-error"></div>
      <div class="success-msg mb-4" id="login-success"></div>

      <button class="btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>

      <p style="text-align:center;color:#6b7280;font-size:13px;margin-top:16px">
        Não tem conta? <span onclick="setSubTab('cadastro')" style="color:#45edee;cursor:pointer;font-size:13px">Criar agora</span>
      </p>
    </div>

    <!-- FORM: CADASTRO -->
    <div id="form-cadastro" style="display:none">
      <div class="mb-4">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">Nome completo</label>
        <input id="cad-nome" type="text" class="input-field" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="mb-4">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">E-mail</label>
        <input id="cad-email" type="email" class="input-field" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="mb-4">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">Senha</label>
        <div style="position:relative">
          <input id="cad-senha" type="password" class="input-field" placeholder="Mínimo 6 caracteres" autocomplete="new-password" style="padding-right:48px">
          <button onclick="toggleSenha('cad-senha',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b7280;cursor:pointer;font-size:18px">👁</button>
        </div>
      </div>

      <!-- Campo extra para professor -->
      <div id="campo-escola" style="display:none" class="mb-4">
        <label style="color:#9ca3af;font-size:13px;display:block;margin-bottom:6px">Escola onde leciona</label>
        <input id="cad-escola" type="text" class="input-field" placeholder="Nome da escola">
      </div>

      <div class="error-msg mb-4" id="cad-error"></div>
      <div class="success-msg mb-4" id="cad-success"></div>

      <button class="btn-primary" id="btn-cadastro" onclick="fazerCadastro()">Criar conta</button>

      <!-- Aviso para professor -->
      <div id="aviso-professor" style="display:none;background:#6c5ce722;border:1px solid #6c5ce744;border-radius:8px;padding:12px;margin-top:16px">
        <p style="color:#9ca3af;font-size:13px;text-align:center">
          ⚠️ Contas de professor passam por <strong style="color:#fff">aprovação manual</strong>.<br>
          Você receberá um e-mail em até 48h.
        </p>
      </div>

      <p style="text-align:center;color:#6b7280;font-size:13px;margin-top:16px">
        Já tem conta? <span onclick="setSubTab('login')" style="color:#45edee;cursor:pointer;font-size:13px">Entrar</span>
      </p>
    </div>

  </div>

  <!-- Link admin -->
  <p style="text-align:center;margin-top:20px">
    <a href="admin-professores.html" style="color:#374151;font-size:12px;text-decoration:none">Acesso Admin</a>
  </p>

</div>

<script>
  // ── Estado ──────────────────────────────────
  let tabAtual = 'aluno';
  let subTabAtual = 'login';

  // ── Redirecionar se já logado ───────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (authEstaLogado()) {
      const tipo = authGetTipo();
      const rotas = { aluno: 'inicio.html', professor: 'professor.html', admin: 'admin-professores.html' };
      window.location.href = rotas[tipo] || 'inicio.html';
    }
  });

  // ── Tabs ─────────────────────────────────────
  window.setTab = function setTab(tab) {
    tabAtual = tab;
    document.getElementById('tab-aluno').className = 'tab-btn ' + (tab === 'aluno' ? 'active' : 'inactive');
    document.getElementById('tab-professor').className = 'tab-btn ' + (tab === 'professor' ? 'active' : 'inactive');
    document.getElementById('campo-escola').style.display = tab === 'professor' ? 'block' : 'none';
    document.getElementById('aviso-professor').style.display = (tab === 'professor' && subTabAtual === 'cadastro') ? 'block' : 'none';
    limparMensagens();
  }

  window.setSubTab = function setSubTab(sub) {
    subTabAtual = sub;
    document.getElementById('form-login').style.display = sub === 'login' ? 'block' : 'none';
    document.getElementById('form-cadastro').style.display = sub === 'cadastro' ? 'block' : 'none';

    const btnLogin = document.getElementById('sub-login');
    const btnCad = document.getElementById('sub-cadastro');
    if (sub === 'login') {
      btnLogin.style.cssText = 'padding-bottom:10px;font-size:15px;font-weight:600;color:#45edee;border-bottom:2px solid #45edee;margin-bottom:-1px;cursor:pointer;transition:all .2s';
      btnCad.style.cssText = 'padding-bottom:10px;font-size:15px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .2s';
    } else {
      btnCad.style.cssText = 'padding-bottom:10px;font-size:15px;font-weight:600;color:#45edee;border-bottom:2px solid #45edee;margin-bottom:-1px;cursor:pointer;transition:all .2s';
      btnLogin.style.cssText = 'padding-bottom:10px;font-size:15px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .2s';
    }

    document.getElementById('aviso-professor').style.display = (tabAtual === 'professor' && sub === 'cadastro') ? 'block' : 'none';
    limparMensagens();
  }

  // ── Mostrar/ocultar senha ────────────────────
  window.toggleSenha = function toggleSenha(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  }

  // ── Mensagens ────────────────────────────────
  function limparMensagens() {
    ['login-error','login-success','cad-error','cad-success'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    });
  }

  function mostrarErro(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function mostrarSucesso(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function setBtnLoading(id, loading, textoNormal) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Aguardando...' : textoNormal;
  }

  // ── LOGIN ────────────────────────────────────
  window.fazerLogin = async function fazerLogin() {
    limparMensagens();
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;

    if (!email || !senha) { mostrarErro('login-error', 'Preencha e-mail e senha.'); return; }

    setBtnLoading('btn-login', true, 'Entrar');
    try {
      const { perfil } = await authLogin(email, senha);
      
      // Verificar se professor está aprovado
      if (perfil?.perfil === 'professor') {
        // Buscar status no banco
        const res = await fetch(`${SUPABASE_URL}/rest/v1/professores?id=eq.${perfil.id}&select=status`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${authGetToken()}` }
        });
        const dados = await res.json();
        const status = dados[0]?.status;
        if (status === 'pendente') {
          mostrarErro('login-error', '⏳ Sua conta está aguardando aprovação. Você receberá um e-mail em breve.');
          authLogout();
          setBtnLoading('btn-login', false, 'Entrar');
          return;
        }
        if (status === 'rejeitado') {
          mostrarErro('login-error', '❌ Seu acesso foi negado. Entre em contato pelo suporte.');
          authLogout();
          setBtnLoading('btn-login', false, 'Entrar');
          return;
        }
      }

      // Redirecionar pelo perfil
      const rotas = { aluno: 'inicio.html', professor: 'professor.html', admin: 'admin-professores.html' };
      window.location.href = rotas[perfil?.perfil] || 'inicio.html';

    } catch (err) {
      setBtnLoading('btn-login', false, 'Entrar');
      const msg = traduzirErroAuth(err.message);
      mostrarErro('login-error', msg);
    }
  }

  // ── CADASTRO ─────────────────────────────────
  window.fazerCadastro = async function fazerCadastro() {
    limparMensagens();
    const nome = document.getElementById('cad-nome').value.trim();
    const email = document.getElementById('cad-email').value.trim();
    const senha = document.getElementById('cad-senha').value;
    const escola = document.getElementById('cad-escola').value.trim();

    if (!nome) { mostrarErro('cad-error', 'Informe seu nome completo.'); return; }
    if (!email) { mostrarErro('cad-error', 'Informe seu e-mail.'); return; }
    if (!senha || senha.length < 6) { mostrarErro('cad-error', 'Senha deve ter pelo menos 6 caracteres.'); return; }
    if (tabAtual === 'professor' && !escola) { mostrarErro('cad-error', 'Informe a escola onde leciona.'); return; }

    setBtnLoading('btn-cadastro', true, 'Criar conta');
    try {
      await authCadastro({
        nome,
        email,
        senha,
        perfil: tabAtual,
        escola: escola || null
      });

      if (tabAtual === 'professor') {
        mostrarSucesso('cad-success', '✅ Cadastro enviado! Aguarde a aprovação por e-mail (até 48h).');
      } else {
        mostrarSucesso('cad-success', '✅ Conta criada! Verifique seu e-mail para confirmar e depois faça login.');
      }
      
      // Limpar campos
      document.getElementById('cad-nome').value = '';
      document.getElementById('cad-email').value = '';
      document.getElementById('cad-senha').value = '';
      document.getElementById('cad-escola').value = '';

    } catch (err) {
      const msg = traduzirErroAuth(err.message);
      mostrarErro('cad-error', msg);
    } finally {
      setBtnLoading('btn-cadastro', false, 'Criar conta');
    }
  }

  // ── Traduzir erros do Supabase ───────────────
  function traduzirErroAuth(msg) {
    if (!msg) return 'Erro desconhecido. Tente novamente.';
    if (msg.includes('Invalid login credentials')) return '❌ E-mail ou senha incorretos.';
    if (msg.includes('Email not confirmed')) return '📧 Confirme seu e-mail antes de entrar.';
    if (msg.includes('User already registered')) return '📧 E-mail já cadastrado. Faça login.';
    if (msg.includes('Password should be')) return '🔒 Senha deve ter pelo menos 6 caracteres.';
    if (msg.includes('Unable to validate')) return '❌ Credenciais inválidas.';
    if (msg.includes('rate limit')) return '⏳ Muitas tentativas. Aguarde alguns minutos.';
    return msg;
  }

  // ── Enter para submeter ──────────────────────
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (subTabAtual === 'login') fazerLogin();
    else fazerCadastro();
  });

</script>
</body>
</html>
